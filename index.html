<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Debug Mode</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    #debug-log {
      position: fixed; top: 10px; left: 10px; right: 10px;
      background: rgba(0,0,0,0.8); color: #0f0;
      padding: 10px; font-family: monospace; font-size: 10px;
      z-index: 10000; pointer-events: none;
    }
    #start-btn {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 20px; z-index: 10001;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">
  <div id="debug-log">Status: Waiting for user...</div>
  <button id="start-btn">START AR</button>

  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: true; patternRatio: 0.5; detectionMode: mono_and_matrix;"
    vr-mode-ui="enabled: false">
    
    <a-marker id="horse-marker" type="pattern" url="heromarketer2.patt">
      <a-box position="0 0.5 0" material="color: yellow; opacity: 0.5"></a-box>
      <a-text value="MARKER FOUND" align="center" rotation="-90 0 0" color="red"></a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const log = document.getElementById('debug-log');
    const btn = document.getElementById('start-btn');
    
    btn.addEventListener('click', () => {
      btn.style.display = 'none';
      log.innerText = "Status: Initializing Camera...";
      
      // Monitor the marker
      const marker = document.getElementById('horse-marker');
      
      marker.addEventListener('markerFound', () => {
        log.innerText = "Status: !!! HORSE FOUND !!!";
        log.style.color = "#fff";
        log.style.background = "green";
      });

      marker.addEventListener('markerLost', () => {
        log.innerText = "Status: Marker Lost (Looking for Horse...)";
        log.style.color = "#0f0";
        log.style.background = "rgba(0,0,0,0.8)";
      });
    });

    // Check if the .patt file is actually accessible
    fetch('heromarketer2.patt')
      .then(r => {
        if(r.ok) log.innerText += "\nFile: heromarketer2.patt LOADED";
        else log.innerText += "\nFile: heromarketer2.patt ERROR 404";
      })
      .catch(e => log.innerText += "\nFile: Network Error");
  </script>
</body>
</html>
