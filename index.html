<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Space Time - The Sequence</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
    #overlay { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; }
    #start-btn { padding: 20px; background: none; border: 1px solid #fff; color: #fff; cursor: pointer; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div id="overlay"><button id="start-btn">BEGIN SEQUENCE</button></div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5;" vr-mode-ui="enabled: false">
    <a-marker id="main-marker" type="pattern" url="heromarketer2.patt">
      <a-entity id="ar-objects"></a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let audioCtx, startTime;
    const startBtn = document.getElementById('start-btn');

    function makeTexture(bg, fg, lines) {
      const c = document.createElement('canvas'); c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');
      ctx.fillStyle = bg; ctx.fillRect(0,0,512,512);
      ctx.fillStyle = fg; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
      lines.forEach((txt, i) => ctx.fillText(txt, 256, 150 + i*100));
      return new THREE.CanvasTexture(c);
    }

    startBtn.addEventListener('click', () => {
      document.getElementById('overlay').style.display = 'none';
      setupScene();
    });

    let shapes = [];
    function setupScene() {
      const group = document.getElementById('ar-objects').object3D;
      
      const list = [
        { geom: new THREE.SphereGeometry(0.7, 32, 32), bg: '#fff', fg: '#000', txt: ['SPACE','TIME'], id: 'sphere' },
        { geom: new THREE.BoxGeometry(0.8, 0.8, 0.8), bg: '#ff00ff', fg: '#fff', txt: ['WAIT','GO'], id: 'cube' },
        { geom: new THREE.TorusGeometry(0.6, 0.2, 16, 100), bg: '#00ffff', fg: '#000', txt: ['KNOW','DON\'T KNOW'], id: 'donut' },
        { geom: new THREE.TorusKnotGeometry(0.5, 0.15, 100, 16), bg: '#6a0dad', fg: '#fff', txt: ['?','?','?'], id: 'knot' }
      ];

      shapes = list.map(conf => {
        const mat = new THREE.MeshStandardMaterial({ map: makeTexture(conf.bg, conf.fg, conf.txt), transparent: true });
        const mesh = new THREE.Mesh(conf.geom, mat);
        mesh.visible = false;
        group.add(mesh);
        return { mesh, id: conf.id };
      });

      group.add(new THREE.AmbientLight(0xffffff, 2));
      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      if (!startTime) startTime = performance.now();
      const duration = 8000; // 8 seconds per shape
      const totalElapsed = (performance.now() - startTime) % (duration * shapes.length);
      const idx = Math.floor(totalElapsed / duration);
      const t = (totalElapsed % duration) / duration;

      shapes.forEach((s, i) => {
        s.mesh.visible = (i === idx);
        if(s.mesh.visible) {
          const m = s.mesh;
          m.rotation.y += 0.01;

          // LOGIC PER SHAPE
          if(s.id === 'sphere') {
            // Sphere comes slowly to center, grows to fill screen
            m.position.set(0, 0.5, -10 + (t * 8));
            m.scale.setScalar(0.2 + (t * 4)); 
            m.material.opacity = t < 0.8 ? 1 : (1 - t) * 5;
          } 
          else if(s.id === 'cube') {
            // Surpass User to the RIGHT
            m.position.set(t * 6, 0.5, -8 + (t * 18));
            m.scale.setScalar(0.5 + t);
          }
          else if(s.id === 'donut') {
            // Surpass User to the LEFT
            m.position.set(t * -6, 0.5, -8 + (t * 18));
            m.scale.setScalar(0.5 + t);
          }
          else if(s.id === 'knot') {
            // Purple knot hovering/pulsing in center
            m.position.set(0, 1, -5);
            m.scale.setScalar(1 + Math.sin(t * Math.PI) * 0.5);
          }
        }
      });
    }
  </script>
</body>
</html>
