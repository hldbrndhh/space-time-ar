<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Space Time AR - Horse Edition</title>
  
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    
    /* Splash Screen to fix iOS Audio/Camera issues */
    #start-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 9999; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px;
    }
    #start-screen p { color: rgba(255,255,255,0.9); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; text-align: center; line-height: 2.8; }
    #start-btn { font-weight: 400; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: #000; background: #fff; border: none; padding: 18px 48px; cursor: pointer; transition: opacity 0.3s; }
    #start-btn:active { opacity: 0.5; }
    
    #ar-container { display: none; }
    #info { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; z-index: 5; pointer-events: none; text-align: center; }
  </style>
</head>

<body>
  <div id="start-screen">
    <p>Point your camera<br/>at the horse marker<br/>to begin</p>
    <button id="start-btn">activate camera</button>
  </div>
  <div id="info">space time</div>

  <div id="ar-container">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5;" 
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false">
      
      <a-marker id="main-marker" type="pattern" url="heromarketer2.patt">
        <a-entity id="ar-objects"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <script>
    let audioCtx, masterOutput, shapeSound;
    const startBtn = document.getElementById('start-btn');

    // --- AUDIO SYSTEM ---
    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const limiter = audioCtx.createDynamicsCompressor();
      limiter.threshold.value = -1; 
      limiter.connect(audioCtx.destination);

      // Deep Drone
      const droneGain = audioCtx.createGain();
      droneGain.gain.value = 0.15;
      [[55,'sine'],[55.5,'sine'],[82.4,'triangle']].forEach(([f, t]) => {
        const o = audioCtx.createOscillator(); o.type = t; o.frequency.value = f;
        o.connect(droneGain); o.start();
      });
      droneGain.connect(limiter);
      return limiter;
    }

    // --- CANVAS TEXTURES ---
    function makeLinearTexture(bg, fg, words) {
      const size = 1024;
      const c = document.createElement('canvas'); c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, size, size);
      ctx.font = "bold 140px Arial"; ctx.fillStyle = fg;
      words.forEach((w, i) => ctx.fillText(w, 80, 250 + i * 200));
      return new THREE.CanvasTexture(c);
    }

    // --- START AR ---
    startBtn.addEventListener('click', async () => {
      masterOutput = initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('ar-container').style.display = 'block';
      
      // Force iPhone to recalculate camera size
      window.dispatchEvent(new Event('resize'));
      setupShapes();
    });

    let shapes = [], startTime, lastIdx = -1;

    function setupShapes() {
      const group = document.getElementById('ar-objects').object3D;
      const mat = (t) => new THREE.MeshStandardMaterial({ map: t });
      
      shapes = [
        new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), mat(makeLinearTexture('#fff','#000',['SPACE','TIME']))),
        new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,1.5), mat(makeLinearTexture('#ff00ff','#000',['IDEA']))),
        new THREE.Mesh(new THREE.TorusGeometry(1, 0.4, 16, 100), mat(makeLinearTexture('#00ffff','#000',['GO'])))
      ];

      shapes.forEach(s => { s.visible = false; group.add(s); });
      group.add(new THREE.AmbientLight(0xffffff, 1.5));
      
      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      if (!startTime) startTime = performance.now();
      const elapsed = (performance.now() - startTime) % 30000;
      const idx = Math.floor(elapsed / 10000);
      const t = (elapsed % 10000) / 10000;

      shapes.forEach((s, i) => s.visible = (i === idx));
      const s = shapes[idx];
      
      // Animation Logic: Movement and Rotation
      s.position.z = -20 + (t * 25);
      s.rotation.y += 0.02;
      s.rotation.x += 0.01;
      s.scale.setScalar(0.5 + t * 3);
    }
  </script>
</body>
</html>
